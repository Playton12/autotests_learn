[pytest]
testpaths = tests
markers =
    api: API tests
    ui: UI tests
    smoke: Smoke tests
    regression: Regression tests
addopts =
    -v
    --tb=short
    --strict-markers
    --alluredir=allure-results
    --reruns=2
    --reruns-delay=3
    --html=reports/report.html
    --self-contained-html
