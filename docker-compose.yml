services:
  petstore:
    image: swaggerapi/petstore:latest
    container_name: petstore
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/v2/pet/findByStatus?status=available"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped
